name: Windows Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  windows-amd64:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: .tool-versions

      - name: Install fyne-cross
        run: go install github.com/fyne-io/fyne-cross@latest

      - name: Build Windows binary
        run: |
          "$(go env GOPATH)/bin/fyne-cross" windows -arch=amd64 -name goedgepickt-orders-export.exe ./cmd/goedgepickt-orders-export

      - name: Collect Windows binary
        run: |
          mkdir -p release-assets
          exe_path="$(find fyne-cross/dist/windows-amd64 -type f -name 'goedgepickt-orders-export.exe' | head -n 1)"
          test -n "$exe_path"
          cp "$exe_path" "release-assets/goedgepickt-orders-export-windows-amd64.exe"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: goedgepickt-orders-export-windows-amd64
          path: release-assets/goedgepickt-orders-export-windows-amd64.exe
          if-no-files-found: error

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/goedgepickt-orders-export-windows-amd64.exe
          generate_release_notes: true
